name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: rust_multitul
            asset_suffix: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: rust_multitul.exe
            asset_suffix: windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="rust_multitul-${VERSION}-${{ matrix.asset_suffix }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${STAGE}/"
          cp -r assets "dist/${STAGE}/"
          if [ -f README.md ]; then cp README.md "dist/${STAGE}/"; fi
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Pack tar.gz (Linux)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Pack zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Set-Location dist
          Compress-Archive -Path "$env:STAGE" -DestinationPath "$env:STAGE.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: dist/${{ env.STAGE }}.${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
