<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            accent: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            },
          },
          boxShadow: {
            soft: '0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.05)',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    /* tidy scrollbar inside the room list */
    .scroll-tidy::-webkit-scrollbar { width: 8px; }
    .scroll-tidy::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 9999px; }
    .scroll-tidy::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased min-h-screen">

  <div class="mx-auto w-full max-w-[1400px] px-4 sm:px-6 lg:px-8 py-8 space-y-8">

    <!-- Header -->
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="space-y-1">
        <p class="text-sm font-medium text-accent-600">Association Server</p>
        <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-neutral-900">Dashboard</h1>
        <p class="text-sm text-neutral-500 max-w-2xl">
          Живой снимок состояния сервера: комнаты, игроки, сабмиты по раундам, история игры и чат.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <span id="lastUpdated" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white border border-neutral-200 text-sm text-neutral-500 shadow-soft">
          <span class="h-1.5 w-1.5 rounded-full bg-neutral-300"></span>
          Ожидание данных
        </span>
        <button
          id="refreshButton"
          type="button"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-2xl bg-accent-600 text-white text-sm font-medium hover:bg-accent-700 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:ring-offset-2 focus:ring-offset-neutral-50 transition-colors shadow-soft"
        >
          Обновить
        </button>
      </div>
    </header>

    <!-- Stats -->
    <section id="stats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></section>

    <!-- Layout -->
    <section class="grid grid-cols-1 lg:grid-cols-[320px_minmax(0,1fr)] gap-6">

      <!-- Rooms -->
      <aside class="bg-white border border-neutral-200 rounded-2xl shadow-soft overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
          <h2 class="text-sm font-semibold text-neutral-900">Комнаты</h2>
          <span id="roomCountBadge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-neutral-100 text-neutral-600">
            0 активных
          </span>
        </div>
        <div id="roomList" class="p-3 space-y-2 max-h-[70vh] overflow-y-auto scroll-tidy"></div>
      </aside>

      <!-- Details -->
      <main class="bg-white border border-neutral-200 rounded-2xl shadow-soft overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
          <h2 class="text-sm font-semibold text-neutral-900">Детали комнаты</h2>
          <span id="selectionBadge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-neutral-100 text-neutral-600">
            Ничего не выбрано
          </span>
        </div>
        <div id="roomDetails" class="p-5 sm:p-6 space-y-6"></div>
      </main>
    </section>
  </div>

  <script>
    const state = {
      snapshot: null,
      selectedRoomId: null,
      pollTimer: null,
    };

    const statsEl = document.getElementById("stats");
    const roomListEl = document.getElementById("roomList");
    const roomDetailsEl = document.getElementById("roomDetails");
    const roomCountBadgeEl = document.getElementById("roomCountBadge");
    const selectionBadgeEl = document.getElementById("selectionBadge");
    const lastUpdatedEl = document.getElementById("lastUpdated");
    const refreshButton = document.getElementById("refreshButton");

    function formatTime(ts) {
      if (!ts) {
        return "—";
      }

      return new Date(ts * 1000).toLocaleString("ru-RU", {
        hour12: false,
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function statusBadgeClass(kind) {
      // single accent color + neutral states; no random colors
      const base = "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium";
      if (kind === "success") return `${base} bg-accent-50 text-accent-700`;
      if (kind === "warn")    return `${base} bg-neutral-900 text-white`;
      if (kind === "danger")  return `${base} bg-neutral-200 text-neutral-700`;
      return `${base} bg-neutral-100 text-neutral-600`;
    }

    function neutralBadge() {
      return "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-neutral-100 text-neutral-600";
    }

    function renderStats(snapshot) {
      const items = [
        { label: "Активные комнаты",    value: snapshot.summary.room_count },
        { label: "Игроки онлайн",       value: snapshot.summary.player_count },
        { label: "Завершённые игры",    value: snapshot.summary.finished_room_count },
        { label: "Сообщения в чатах",   value: snapshot.summary.chat_message_count },
      ];

      statsEl.innerHTML = items.map((item) => `
        <article class="bg-white border border-neutral-200 rounded-2xl p-5 shadow-soft">
          <p class="text-sm text-neutral-500">${escapeHtml(item.label)}</p>
          <p class="mt-2 text-3xl font-semibold tracking-tight text-neutral-900">${escapeHtml(item.value)}</p>
        </article>
      `).join("");
    }

    function ensureSelection(rooms) {
      if (!rooms.length) {
        state.selectedRoomId = null;
        return;
      }

      const exists = rooms.some((room) => room.id === state.selectedRoomId);
      if (!exists) {
        state.selectedRoomId = rooms[0].id;
      }
    }

    function renderRoomList(snapshot) {
      const rooms = snapshot.rooms;
      roomCountBadgeEl.textContent = `${rooms.length} активных`;
      ensureSelection(rooms);

      if (!rooms.length) {
        roomListEl.innerHTML = `
          <div class="px-4 py-10 text-center text-sm text-neutral-500 border border-dashed border-neutral-200 rounded-xl">
            Сейчас нет активных комнат.
          </div>
        `;
        return;
      }

      roomListEl.innerHTML = rooms.map((room) => {
        const statusKind = room.finished
          ? "success"
          : (room.player_count === room.max_players ? "warn" : "default");
        const statusText = room.finished
          ? "Завершена"
          : (room.player_count === room.max_players ? "Полная" : "Ожидает");

        const isActive = room.id === state.selectedRoomId;
        const itemClass = isActive
          ? "w-full text-left rounded-xl p-4 bg-accent-50 border border-accent-100 transition"
          : "w-full text-left rounded-xl p-4 bg-white border border-neutral-200 hover:border-neutral-300 hover:bg-neutral-50 transition";

        return `
          <button class="${itemClass}" data-room-id="${escapeHtml(room.id)}" type="button">
            <div class="flex items-center justify-between gap-2">
              <span class="font-medium text-neutral-900 truncate">${escapeHtml(room.id)}</span>
              <span class="${statusBadgeClass(statusKind)}">${escapeHtml(statusText)}</span>
            </div>
            <div class="mt-3 flex flex-wrap items-center gap-2">
              <span class="${neutralBadge()}">Игроков ${escapeHtml(room.player_count)}/${escapeHtml(room.max_players)}</span>
              <span class="${neutralBadge()}">Раунд ${escapeHtml(room.round_number)}</span>
            </div>
          </button>
        `;
      }).join("");

      for (const button of roomListEl.querySelectorAll("[data-room-id]")) {
        button.addEventListener("click", () => {
          state.selectedRoomId = button.getAttribute("data-room-id");
          render();
        });
      }
    }

    function renderList(items, emptyText, renderItem) {
      if (!items.length) {
        return `
          <div class="px-4 py-8 text-center text-sm text-neutral-500 border border-dashed border-neutral-200 rounded-xl">
            ${escapeHtml(emptyText)}
          </div>
        `;
      }

      return `<div class="space-y-2">${items.map(renderItem).join("")}</div>`;
    }

    function renderRoomDetails(snapshot) {
      const room = snapshot.rooms.find((item) => item.id === state.selectedRoomId);

      if (!room) {
        selectionBadgeEl.textContent = "Ничего не выбрано";
        roomDetailsEl.innerHTML = `
          <div class="px-4 py-12 text-center text-sm text-neutral-500 border border-dashed border-neutral-200 rounded-2xl">
            Выберите комнату слева, чтобы посмотреть детали.
          </div>
        `;
        return;
      }

      selectionBadgeEl.textContent = room.id;

      const statusKind = room.finished
        ? "success"
        : (room.player_count === room.max_players ? "warn" : "default");
      const statusText = room.finished
        ? "Игра завершена"
        : (room.player_count === room.max_players ? "Все игроки в комнате" : "Комната ожидает игроков");

      roomDetailsEl.innerHTML = `
        <header class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
          <div class="space-y-1">
            <h2 class="text-xl font-semibold tracking-tight text-neutral-900">${escapeHtml(room.id)}</h2>
            <p class="text-sm text-neutral-500">Последнее изменение: ${escapeHtml(formatTime(room.last_activity_at))}</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span class="${statusBadgeClass(statusKind)}">${escapeHtml(statusText)}</span>
            <span class="${neutralBadge()}">Раунд ${escapeHtml(room.round_number)}</span>
            <span class="${neutralBadge()}">Готовы ${escapeHtml(room.ready_count)}/${escapeHtml(room.max_players)}</span>
          </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <article class="bg-white border border-neutral-200 rounded-2xl overflow-hidden">
            <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
              <h3 class="text-sm font-semibold text-neutral-900">Игроки</h3>
              <span class="${neutralBadge()}">${escapeHtml(room.player_count)} в комнате</span>
            </div>
            <div class="p-4">
              ${renderList(room.players, "Игроков пока нет.", (player) => `
                <div class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl border border-neutral-200">
                  <span class="font-medium text-neutral-900 truncate">${escapeHtml(player.name)}</span>
                  <span class="text-xs text-neutral-500 truncate">${escapeHtml(player.id)}</span>
                </div>
              `)}
            </div>
          </article>

          <article class="bg-white border border-neutral-200 rounded-2xl overflow-hidden">
            <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
              <h3 class="text-sm font-semibold text-neutral-900">Текущие сабмиты</h3>
              <span class="${neutralBadge()}">${escapeHtml(room.ready_count)} готовы</span>
            </div>
            <div class="p-4">
              ${renderList(room.submissions, "В текущем раунде ещё нет отправленных слов.", (submission) => `
                <div class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl border border-neutral-200">
                  <span class="font-medium text-neutral-900 truncate">${escapeHtml(submission.player_name)}</span>
                  <code class="px-2 py-1 rounded-md bg-neutral-100 text-xs text-neutral-700">${escapeHtml(submission.word)}</code>
                </div>
              `)}
            </div>
          </article>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <article class="bg-white border border-neutral-200 rounded-2xl overflow-hidden">
            <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
              <h3 class="text-sm font-semibold text-neutral-900">История игры</h3>
              <span class="${neutralBadge()}">${escapeHtml(room.history.length)} раундов</span>
            </div>
            <div class="p-4">
              ${renderList(room.history, "История раундов пока пуста.", (entry) => `
                <div class="px-4 py-3 rounded-xl border border-neutral-200 space-y-2">
                  <div class="flex items-center justify-between gap-3">
                    <span class="font-medium text-neutral-900">Раунд ${escapeHtml(entry.round)}</span>
                    <span class="${statusBadgeClass(entry.match ? "success" : "danger")}">${escapeHtml(entry.match ? "Совпали" : "Не совпали")}</span>
                  </div>
                  <div class="flex flex-wrap gap-2">
                    ${
                      Object.entries(entry.words)
                        .map(([name, word]) => `<code class="px-2 py-1 rounded-md bg-neutral-100 text-xs text-neutral-700">${escapeHtml(name)}: ${escapeHtml(word)}</code>`)
                        .join("")
                      || "<span class='text-xs text-neutral-500'>Нет данных</span>"
                    }
                  </div>
                </div>
              `)}
            </div>
          </article>

          <article class="bg-white border border-neutral-200 rounded-2xl overflow-hidden">
            <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-100">
              <h3 class="text-sm font-semibold text-neutral-900">Чат комнаты</h3>
              <span class="${neutralBadge()}">${escapeHtml(room.chat_history.length)} сообщений</span>
            </div>
            <div class="p-4">
              ${renderList(room.chat_history, "История чата пока пуста.", (message) => `
                <div class="px-4 py-3 rounded-xl border border-neutral-200 space-y-1.5">
                  <div class="flex items-center justify-between gap-3 text-xs text-neutral-500">
                    <span class="font-medium text-neutral-700">${escapeHtml(message.sender_name)}</span>
                    <span>${escapeHtml(formatTime(message.timestamp))}</span>
                  </div>
                  <p class="whitespace-pre-wrap text-sm leading-relaxed text-neutral-800">${escapeHtml(message.text)}</p>
                </div>
              `)}
            </div>
          </article>
        </div>
      `;
    }

    function render() {
      const snapshot = state.snapshot;
      if (!snapshot) {
        return;
      }

      renderStats(snapshot);
      renderRoomList(snapshot);
      renderRoomDetails(snapshot);
    }

    async function loadState() {
      try {
        const response = await fetch("/api/dashboard/state", {
          cache: "no-store",
          headers: { "Accept": "application/json" },
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        state.snapshot = await response.json();
        lastUpdatedEl.innerHTML = `
          <span class="h-1.5 w-1.5 rounded-full bg-accent-500"></span>
          Обновлено: ${new Date().toLocaleTimeString("ru-RU", { hour12: false })}
        `;
        render();
      } catch (error) {
        lastUpdatedEl.innerHTML = `
          <span class="h-1.5 w-1.5 rounded-full bg-neutral-400"></span>
          Ошибка обновления: ${escapeHtml(error.message)}
        `;
      }
    }

    refreshButton.addEventListener("click", loadState);
    loadState();
    state.pollTimer = window.setInterval(loadState, 2000);
  </script>
</body>
</html>
